name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check MoonBit version
        run: moon version --all

      - name: Update dependencies
        run: moon update

      - name: Check code
        run: moon check

      - name: Run tests
        run: moon test

      - name: Build project
        run: moon build

      - name: Render test - Three Spheres
        run: |
          echo "Testing three_spheres scene..."
          moon run cmd/main > test_three_spheres.ppm
          head -1 test_three_spheres.ppm | grep -q "P3" && echo "OK" || exit 1

      - name: Render test - Geometric Scene
        run: |
          echo "Testing geometric scene..."
          moon run cmd/main > test_geometric.ppm
          head -1 test_geometric.ppm | grep -q "P3" && echo "OK" || exit 1

      - name: Upload render artifacts
        uses: actions/upload-artifact@v4
        with:
          name: render-samples
          path: "test_*.ppm"
